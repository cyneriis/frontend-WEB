<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>CYNERIS — Reveal</title>

<style>
:root{
  --bg0:#040a18;
  --bg1:#071a3a;
  --bg2:#0b2b5e;
  --ink:#eaf2ff;
  --muted:rgba(234,242,255,.72);
  --shadow:0 30px 90px rgba(0,0,0,.6);
}

*{box-sizing:border-box;}

html,body{
  height:100%;
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;
}

body{
  color:var(--ink);
  background:
    radial-gradient(1100px 800px at 20% 15%, rgba(20,184,214,.16), transparent 60%),
    radial-gradient(900px 700px at 85% 25%, rgba(11,99,214,.16), transparent 58%),
    linear-gradient(180deg,var(--bg0),var(--bg1) 40%,var(--bg2));
  overflow:hidden;
}

canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

#bg{z-index:0;}
#fx{z-index:1;mix-blend-mode:screen;opacity:.85;}

.wrap{
  position:relative;
  z-index:2;
  min-height:100dvh; /* ✅ mobile viewport moderne */
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    max(16px, env(safe-area-inset-top))
    max(16px, env(safe-area-inset-right))
    max(16px, env(safe-area-inset-bottom))
    max(16px, env(safe-area-inset-left));
}

.card{
  width:min(820px,100%);
  border-radius:24px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  padding:34px 30px;
  text-align:center;
}

.logoOrb{
  width:110px;
  height:110px;
  border-radius:50%;
  margin:0 auto 14px;
  background:linear-gradient(135deg,#0b63d6,#0d3b8e);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 18px 60px rgba(0,0,0,.5);
  flex-shrink:0;
}

.logoOrb img{
  width:70px;
  height:70px;
  object-fit:contain;
  max-width:100%;
}

.name{
  font-weight:900;
  letter-spacing:.12em;
  font-size:28px;
  margin-bottom:10px;
  line-height:1.1;
  word-break:break-word;
}

.tagTitle{
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  line-height:1.3;
}

.tagline{
  font-size:14px;
  color:var(--muted);
  line-height:1.45;
  max-width:100%;
  /* ✅ plus de nowrap/ellipsis pour mobile */
  white-space:normal;
  overflow-wrap:anywhere;
}

.count{
  margin-top:22px;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
}

.unit{
  border-radius:14px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.14);
  padding:14px 10px;
  min-width:0; /* ✅ évite les débordements */
}

.num{
  font-size:34px;
  font-weight:900;
  line-height:1;
  font-variant-numeric:tabular-nums; /* ✅ chiffres alignés */
}

.lab{
  font-size:11px;
  letter-spacing:.14em;
  color:var(--muted);
  margin-top:6px;
  line-height:1.2;
  white-space:normal;
}

/* =========================
   TABLETTE
   ========================= */
@media (max-width: 900px){
  .card{
    padding:28px 22px;
    border-radius:20px;
  }

  .name{
    font-size:24px;
    letter-spacing:.1em;
  }

  .tagline{
    font-size:13px;
  }

  .num{
    font-size:30px;
  }
}

/* =========================
   MOBILE
   ========================= */
@media (max-width: 640px){
  body{
    overflow:auto; /* ✅ évite coupe visuelle sur petits écrans */
  }

  .wrap{
    align-items:flex-start;
    padding-top:max(20px, env(safe-area-inset-top));
    padding-bottom:max(20px, env(safe-area-inset-bottom));
  }

  .card{
    margin:auto 0;
    padding:22px 16px;
    border-radius:18px;
  }

  .logoOrb{
    width:82px;
    height:82px;
    margin-bottom:12px;
  }

  .logoOrb img{
    width:52px;
    height:52px;
  }

  .name{
    font-size:20px;
    letter-spacing:.08em;
    margin-bottom:8px;
  }

  .tagTitle{
    font-size:11px;
    letter-spacing:.12em;
    margin-bottom:6px;
  }

  .tagline{
    font-size:12px;
    line-height:1.4;
  }

  .count{
    grid-template-columns:repeat(2,minmax(0,1fr)); /* ✅ 2x2 sur mobile */
    gap:8px;
    margin-top:16px;
  }

  .unit{
    padding:12px 8px;
    border-radius:12px;
  }

  .num{
    font-size:24px;
  }

  .lab{
    font-size:10px;
    letter-spacing:.08em;
    margin-top:4px;
  }
}

/* =========================
   PETITS MOBILES
   ========================= */
@media (max-width: 380px){
  .card{padding:18px 12px;}
  .name{font-size:18px;}
  .tagline{font-size:11px;}
  .num{font-size:22px;}
  .lab{font-size:9px;}
}

/* ✅ Accessibilité : réduction animation */
@media (prefers-reduced-motion: reduce){
  #fx{opacity:.45;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div class="wrap">
  <div class="card">

    <div class="logoOrb">
     <img src="cyneris.jpg" alt="Cyneris">
    </div>

    <div class="name">CYNERIS</div>

    <div class="tagTitle">BUILDING A SECURE PLATFORM</div>
    <div class="tagline">
      Integrated SW · Cloud (IaaS/PaaS/SaaS) · Cybersecurity · Technical Debt · Data Science
    </div>

    <div class="count">
      <div class="unit"><div id="d" class="num">10</div><div class="lab">JOURS</div></div>
      <div class="unit"><div id="h" class="num">00</div><div class="lab">HEURES</div></div>
      <div class="unit"><div id="m" class="num">00</div><div class="lab">MINUTES</div></div>
      <div class="unit"><div id="s" class="num">00</div><div class="lab">SECONDES</div></div>
    </div>

  </div>
</div>

<script>
const offsetDays = 10;
const key = "cyneris_reveal_v3";
const now = Date.now();
let target = Number(localStorage.getItem(key));

if (!target || target < now) {
  target = now + offsetDays * 24 * 60 * 60 * 1000;
  localStorage.setItem(key, String(target));
}

function pad(n){ return String(n).padStart(2, "0"); }

function tick(){
  let diff = target - Date.now();

  // ✅ sécurité : empêche les valeurs négatives
  if (diff < 0) diff = 0;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("d").textContent = d;
  document.getElementById("h").textContent = pad(h);
  document.getElementById("m").textContent = pad(m);
  document.getElementById("s").textContent = pad(s);
}

tick(); // ✅ affichage immédiat
setInterval(tick, 1000);
</script>

</body>
</html>
