<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CYNERIS — Reveal</title>
<meta name="description" content="CYNERIS — Coming soon." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#eaf2ff;
    --muted:rgba(234,242,255,.65);
    --cyan:#14b8d6;
    --cyanGlow:rgba(20,184,214,.5);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:'Orbitron',system-ui,sans-serif;overflow:hidden;}
  body{
    color:var(--ink);
    background:#020810;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #hyperspace{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

  .vignette{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 35%, rgba(2,8,16,.8) 100%);
  }

  /* ── Liquid Glass Container ── */
  .glass{
    position:relative;
    z-index:2;
    width:min(780px,94vw,72vh);
    height:min(780px,94vw,72vh);
    max-width:780px;max-height:780px;
    border-radius:50%;
    /* Liquid glass: near-invisible, stars pass through */
    background:rgba(255,255,255,.008);
    border:1px solid rgba(255,255,255,.04);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.03),
      inset 0 -1px 0 rgba(0,0,0,.03);
    backdrop-filter:blur(4px) saturate(1.1);
    -webkit-backdrop-filter:blur(4px) saturate(1.1);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:glassIn 2s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes glassIn{
    0%{opacity:0;transform:scale(.88);}
    100%{opacity:1;transform:none;}
  }

  /* ── Center Hub ── */
  .hub{
    text-align:center;
    position:relative;
    z-index:3;
  }

  .logoOrb{
    width:160px;height:160px;
    margin:0 auto 14px;
    border-radius:50%;
    background:#ffffff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:
      0 20px 60px rgba(0,0,0,.35),
      0 0 50px rgba(20,184,214,.12);
    border:2px solid rgba(255,255,255,.3);
    overflow:hidden;
    animation:orbPulse 5s ease-in-out infinite alternate;
  }
  @keyframes orbPulse{
    0%{box-shadow:0 20px 60px rgba(0,0,0,.35),0 0 50px rgba(20,184,214,.12);}
    100%{box-shadow:0 20px 60px rgba(0,0,0,.35),0 0 80px rgba(20,184,214,.25);}
  }
  .logoOrb img{width:120px;height:120px;object-fit:contain;}

  .name{
    font-size:28px;font-weight:900;letter-spacing:.2em;
    margin:0 0 4px;
    color:#ffffff;
    text-shadow:none;
  }
  .tagTitle{
    font-size:9px;letter-spacing:.25em;text-transform:uppercase;
    color:var(--muted);margin:0;
  }

  /* ── Orbital Offers ── */
  .offer{
    position:absolute;
    transform:translate(-50%,-50%);
    padding:14px 26px;
    border-radius:34px;
    /* Pure white glass */
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    text-align:center;
    white-space:nowrap;
    cursor:default;
    transition:all .4s cubic-bezier(.22,1,.36,1);
    animation:offerIn .8s cubic-bezier(.22,1,.36,1) both;
  }
  .offer:hover{
    background:rgba(255,255,255,.18);
    border-color:rgba(255,255,255,.55);
    transform:translate(-50%,-50%) scale(1.1);
    box-shadow:0 0 50px rgba(255,255,255,.3), 0 0 25px rgba(255,255,255,.15);
  }
  @keyframes offerIn{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.6);}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  }
  /* Async blink — each offer has its own rhythm & duration, never syncs */
  @keyframes glow0{
    0%,100%{box-shadow:0 0 8px rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03);opacity:.5;}
    50%{box-shadow:0 0 40px rgba(255,255,255,.35), 0 0 20px rgba(255,255,255,.2);border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.14);opacity:1;}
  }
  @keyframes glow1{
    0%,100%{box-shadow:0 0 6px rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.02);opacity:.45;}
    55%{box-shadow:0 0 35px rgba(255,255,255,.32), 0 0 18px rgba(255,255,255,.18);border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.12);opacity:1;}
  }
  @keyframes glow2{
    0%,100%{box-shadow:0 0 10px rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.03);opacity:.55;}
    48%{box-shadow:0 0 38px rgba(255,255,255,.33), 0 0 22px rgba(255,255,255,.19);border-color:rgba(255,255,255,.52);background:rgba(255,255,255,.13);opacity:1;}
  }
  @keyframes glow3{
    0%,100%{box-shadow:0 0 7px rgba(255,255,255,.05);border-color:rgba(255,255,255,.11);background:rgba(255,255,255,.025);opacity:.48;}
    52%{box-shadow:0 0 34px rgba(255,255,255,.3), 0 0 17px rgba(255,255,255,.17);border-color:rgba(255,255,255,.48);background:rgba(255,255,255,.11);opacity:1;}
  }
  @keyframes glow4{
    0%,100%{box-shadow:0 0 9px rgba(255,255,255,.05);border-color:rgba(255,255,255,.13);background:rgba(255,255,255,.03);opacity:.52;}
    46%{box-shadow:0 0 42px rgba(255,255,255,.36), 0 0 21px rgba(255,255,255,.2);border-color:rgba(255,255,255,.54);background:rgba(255,255,255,.14);opacity:1;}
  }

  .offer[data-idx="0"]{animation:offerIn .8s cubic-bezier(.22,1,.36,1) both, glow0 3.2s ease-in-out 0s infinite;}
  .offer[data-idx="1"]{animation:offerIn .8s cubic-bezier(.22,1,.36,1) both, glow1 4.1s ease-in-out 0.6s infinite;}
  .offer[data-idx="2"]{animation:offerIn .8s cubic-bezier(.22,1,.36,1) both, glow2 2.8s ease-in-out 1.3s infinite;}
  .offer[data-idx="3"]{animation:offerIn .8s cubic-bezier(.22,1,.36,1) both, glow3 3.7s ease-in-out 0.2s infinite;}
  .offer[data-idx="4"]{animation:offerIn .8s cubic-bezier(.22,1,.36,1) both, glow4 4.5s ease-in-out 1.8s infinite;}

  .offer-num{
    font-size:10px;letter-spacing:.2em;
    color:#ffffff;margin-bottom:3px;
    text-shadow:0 0 12px rgba(255,255,255,.6);
  }
  .offer-name{
    font-size:15px;font-weight:700;letter-spacing:.08em;
    color:#ffffff;
    text-shadow:0 0 14px rgba(255,255,255,.5);
  }

  /* ── Orbit ring (decorative) ── */
  .orbit-ring{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:1px solid rgba(20,184,214,.06);
    pointer-events:none;
    animation:ringRotate 120s linear infinite;
  }
  @keyframes ringRotate{
    0%{transform:translate(-50%,-50%) rotate(0deg);}
    100%{transform:translate(-50%,-50%) rotate(360deg);}
  }

  /* ── Countdown (below glass) ── */
  .countdown-wrap{
    position:fixed;
    top:24px;left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;gap:12px;
    animation:fadeUp 2s 0.5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeUp{
    0%{opacity:0;transform:translateX(-50%) translateY(-20px);}
    100%{opacity:1;transform:translateX(-50%) translateY(0);}
  }
  .cd-unit{
    text-align:center;
    padding:16px 20px 14px;
    border-radius:18px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    min-width:86px;
  }
  .cd-num{
    font-size:34px;font-weight:900;font-variant-numeric:tabular-nums;
    text-shadow:0 0 15px rgba(20,184,214,.25);
  }
  .cd-lab{
    font-size:10px;letter-spacing:.18em;color:var(--muted);
    text-transform:uppercase;margin-top:3px;
  }

  /* ── Speed Controls ── */
  .controls{
    position:fixed;bottom:24px;left:50%;
    transform:translateX(-50%);z-index:10;
    display:flex;gap:6px;opacity:.45;transition:opacity .3s;
  }
  .controls:hover{opacity:1;}
  .ctrl-btn{
    font-family:'Orbitron',monospace;font-size:11px;letter-spacing:.12em;
    padding:10px 22px;border:1px solid rgba(255,255,255,.1);border-radius:24px;
    background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;
    backdrop-filter:blur(10px);transition:all .3s;
  }
  .ctrl-btn:hover,.ctrl-btn.active{
    background:rgba(20,184,214,.1);border-color:rgba(20,184,214,.3);
    color:#fff;text-shadow:0 0 10px var(--cyanGlow);
  }

  .warp-hud{
    position:fixed;top:16px;right:20px;z-index:10;
    font-family:'Orbitron',monospace;font-size:8px;letter-spacing:.12em;
    color:rgba(20,184,214,.6);text-align:right;
  }
  .warp-bar{
    width:80px;height:2px;background:rgba(20,184,214,.1);
    border-radius:2px;margin-top:4px;overflow:hidden;
  }
  .warp-fill{
    height:100%;width:5%;
    background:linear-gradient(90deg,var(--cyan),#4fc3f7);
    border-radius:2px;transition:width .6s ease;
    box-shadow:0 0 6px var(--cyanGlow);
  }

  @media(max-width:600px){
    .glass{width:min(92vw,68vh);height:min(92vw,68vh);}
    .logoOrb{width:100px;height:100px;}
    .logoOrb img{width:72px;height:72px;}
    .name{font-size:18px;letter-spacing:.14em;}
    .tagTitle{font-size:7px;letter-spacing:.18em;margin-bottom:0;}
    .offer{padding:8px 14px;white-space:normal;max-width:130px;text-align:center;}
    .offer-name{font-size:11px;letter-spacing:.03em;}
    .offer-num{font-size:8px;letter-spacing:.12em;}
    .cd-num{font-size:24px;}
    .cd-unit{min-width:62px;padding:10px 14px 8px;}
    .cd-lab{font-size:8px;}
    .countdown-wrap{top:18px;gap:6px;}
    .controls{bottom:16px;gap:4px;}
    .ctrl-btn{font-size:9px;padding:8px 16px;}
  }

  /* Very small phones */
  @media(max-width:380px){
    .glass{width:min(96vw,62vh);height:min(96vw,62vh);}
    .logoOrb{width:80px;height:80px;}
    .logoOrb img{width:58px;height:58px;}
    .name{font-size:15px;}
    .offer{padding:6px 10px;max-width:110px;}
    .offer-name{font-size:9px;}
    .cd-num{font-size:22px;}
    .cd-unit{min-width:54px;padding:8px 10px 6px;}
    .countdown-wrap{top:14px;gap:5px;}
  }

  /* Landscape mobile */
  @media(max-height:500px){
    .glass{width:min(60vh,80vw);height:min(60vh,80vw);}
    .logoOrb{width:70px;height:70px;}
    .logoOrb img{width:50px;height:50px;}
    .name{font-size:14px;}
    .tagTitle{font-size:6px;}
    .offer{padding:6px 10px;}
    .offer-name{font-size:9px;}
    .offer-num{font-size:6px;}
    .countdown-wrap{top:12px;gap:5px;}
    .cd-num{font-size:20px;}
    .cd-unit{min-width:50px;padding:8px 10px 5px;}
    .controls{bottom:10px;}
  }
</style>
</head>

  <div class="cd-unit"><div class="cd-num" id="s">—</div><div class="cd-lab">Secondes</div></div>
</div>

<div class="controls">
  <button class="ctrl-btn active" data-mode="cruise">CRUISE</button>
  <button class="ctrl-btn" data-mode="jump">JUMP</button>
  <button class="ctrl-btn" data-mode="hyper">HYPERSPACE</button>
</div>

<div class="warp-hud">
  <span id="warpLabel">WARP 1.0</span>
  <div class="warp-bar"><div class="warp-fill" id="warpFill"></div></div>
</div>

<script>
  // ==============================
  // ORBITAL OFFER POSITIONING
  // ==============================
  function positionOffers() {
    const glass = document.getElementById('glassOrbit');
    const W = glass.offsetWidth;
    const H = glass.offsetHeight;
    const cx = W / 2;
    const cy = H / 2;
    // Adaptive orbit radius — tighter on small screens
    const isMobile = window.innerWidth <= 600;
    const factor = isMobile ? 0.38 : 0.40;
    const rx = W * factor;
    const ry = H * factor;

    // 5 offers distributed evenly around circle, starting from top
    const offsets = [-90, -18, 54, 126, 198]; // degrees, spread around
    const ids = ['o0','o1','o2','o3','o4'];

    ids.forEach((id, i) => {
      const el = document.getElementById(id);
      const angle = offsets[i] * (Math.PI / 180);
      const x = cx + rx * Math.cos(angle);
      const y = cy + ry * Math.sin(angle);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.animationDelay = (0.3 + i * 0.15) + 's';
    });
  }
  positionOffers();
  window.addEventListener('resize', positionOffers);

  // ==============================
  // COUNTDOWN (10 DAYS)
  // ==============================
  const REVEAL_DAYS = 10;
  const KEY = "cyneris_reveal_v5";
  const now = Date.now();
  let target = Number(localStorage.getItem(KEY));

  if (!target || target < now) {
    target = now + REVEAL_DAYS * 24 * 60 * 60 * 1000 + 1000;
    try { localStorage.setItem(KEY, String(target)); } catch(e){}
  }

  const elD = document.getElementById("d");
  const elH = document.getElementById("h");
  const elM = document.getElementById("m");
  const elS = document.getElementById("s");
  const pad2 = (n) => String(n).padStart(2, "0");

  function tick() {
    const t = target - Date.now();
    if (t <= 0) { elD.textContent="0"; elH.textContent="00"; elM.textContent="00"; elS.textContent="00"; return; }
    const total = Math.floor(t / 1000);
    elD.textContent = String(Math.floor(total / 86400));
    elH.textContent = pad2(Math.floor((total % 86400) / 3600));
    elM.textContent = pad2(Math.floor((total % 3600) / 60));
    elS.textContent = pad2(total % 60);
  }
  tick();
  setInterval(tick, 1000);

  // ==============================
  // HYPERSPACE STARFIELD
  // ==============================
  const canvas = document.getElementById("hyperspace");
  const ctx = canvas.getContext("2d");
  let cW, cH;

  function resize() {
    cW = canvas.width = window.innerWidth;
    cH = canvas.height = window.innerHeight;
    positionOffers();
  }
  window.addEventListener("resize", resize);
  resize();

  const MODES = {
    cruise:  { speed: 2,  streak: 0,   tunnel: false },
    jump:    { speed: 14, streak: 0.6, tunnel: false },
    hyper:   { speed: 50, streak: 1,   tunnel: true  }
  };

  let currentMode = MODES.cruise;
  let lerpSpeed = 2, lerpStreak = 0, lerpTunnel = 0;

  const STAR_COUNT = 1600;
  const DEPTH = 1500;
  const stars = [];

  function spawnStar(s) {
    s = s || {};
    s.x = (Math.random() - 0.5) * cW * 3;
    s.y = (Math.random() - 0.5) * cH * 3;
    s.z = Math.random() * DEPTH;
    s.pz = s.z;
    s.size = 0.4 + Math.random() * 1.2;
    return s;
  }
  for (let i = 0; i < STAR_COUNT; i++) stars.push(spawnStar({}));

  const rings = [];
  for (let i = 0; i < 20; i++) rings.push({ z: (i / 20) * DEPTH, opacity: 0 });

  const warpLabel = document.getElementById("warpLabel");
  const warpFill = document.getElementById("warpFill");

  document.querySelectorAll(".ctrl-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".ctrl-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentMode = MODES[btn.dataset.mode];
    });
  });

  function frame() {
    lerpSpeed += (currentMode.speed - lerpSpeed) * 0.035;
    lerpStreak += (currentMode.streak - lerpStreak) * 0.04;
    lerpTunnel += ((currentMode.tunnel ? 1 : 0) - lerpTunnel) * 0.03;

    const wf = (lerpSpeed / 50 * 9 + 1).toFixed(1);
    warpLabel.textContent = `WARP ${wf}`;
    warpFill.style.width = `${(lerpSpeed / 50) * 100}%`;

    ctx.fillStyle = "rgba(2,8,16,.28)";
    ctx.fillRect(0, 0, cW, cH);

    const ccx = cW / 2, ccy = cH / 2;

    if (lerpTunnel > 0.01) {
      for (const ring of rings) {
        ring.z -= lerpSpeed * 0.6;
        if (ring.z < 1) ring.z += DEPTH;
        const scale = DEPTH / ring.z;
        const r = Math.max(cW, cH) * 0.6 * scale;
        if (r > 4000) continue;
        const a = lerpTunnel * (1 - ring.z / DEPTH) * 0.12;
        ctx.beginPath();
        ctx.arc(ccx, ccy, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(20,184,214,${a})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    for (const s of stars) {
      s.pz = s.z;
      s.z -= lerpSpeed;
      if (s.z < 1) spawnStar(s);

      const sx = (s.x / s.z) * (cW * 0.3) + ccx;
      const sy = (s.y / s.z) * (cH * 0.3) + ccy;
      if (sx < -50 || sx > cW + 50 || sy < -50 || sy > cH + 50) { spawnStar(s); continue; }

      const depth = 1 - s.z / DEPTH;
      const r = s.size * (1 + depth * 2.5);
      const hue = 195 + depth * 15;
      const light = 75 + depth * 25;
      const alpha = 0.3 + depth * 0.7;

      if (lerpStreak > 0.05) {
        const px = (s.x / s.pz) * (cW * 0.3) + ccx;
        const py = (s.y / s.pz) * (cH * 0.3) + ccy;
        const dx = sx - px, dy = sy - py;
        const streakLen = Math.hypot(dx, dy) * lerpStreak;
        const angle = Math.atan2(dy, dx);
        const tailX = sx - Math.cos(angle) * streakLen;
        const tailY = sy - Math.sin(angle) * streakLen;
        const grad = ctx.createLinearGradient(tailX, tailY, sx, sy);
        grad.addColorStop(0, `hsla(${hue},80%,${light}%,0)`);
        grad.addColorStop(1, `hsla(${hue},80%,${light}%,${alpha})`);
        ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(sx, sy);
        ctx.strokeStyle = grad; ctx.lineWidth = r * 0.9; ctx.stroke();
        ctx.beginPath(); ctx.arc(sx, sy, r * 0.8, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue},60%,95%,${alpha * 0.9})`; ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue},70%,${light}%,${alpha})`; ctx.fill();
        if (depth > 0.5) {
          ctx.beginPath(); ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue},80%,${light}%,${(depth - 0.5) * 0.15})`; ctx.fill();
        }
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
</script>
</body>
</html>
