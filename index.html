<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CYNERIS — Reveal</title>
<meta name="description" content="CYNERIS — Coming soon." />

<style>
  :root{
    --logoBlue:#2b5f8a;
    --logoBlue2:#1f4c73;
    --ink:#eaf2ff;
    --muted:rgba(234,242,255,.75);
    --shadow:0 30px 90px rgba(0,0,0,.60);
    --pagePad: clamp(12px, 3vw, 28px);
  }

  *{box-sizing:border-box}
  html,body{
    height:100%;
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  body{
    color:var(--ink);
    background:
      radial-gradient(1100px 800px at 20% 15%, rgba(20,184,214,.25), transparent 60%),
      radial-gradient(900px 700px at 85% 25%, rgba(11,99,214,.25), transparent 58%),
      linear-gradient(180deg,#040a18,#071a3a 40%,#0b2b5e);
    /* ✅ Responsive: permet de scroller sur petits écrans */
    overflow-x:hidden;
    overflow-y:auto;
    display:grid;
    place-items:center;
    padding:
      max(var(--pagePad), env(safe-area-inset-top))
      max(var(--pagePad), env(safe-area-inset-right))
      max(var(--pagePad), env(safe-area-inset-bottom))
      max(var(--pagePad), env(safe-area-inset-left));
    min-height:100svh;
  }

  canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  #fx{z-index:0; mix-blend-mode:screen; opacity:.95;}

  .card{
    position:relative;
    z-index:2;
    width:min(880px, 100%);
    text-align:center;
    /* ✅ Responsive spacing */
    padding: clamp(18px, 3vw, 36px) clamp(14px, 3vw, 30px) clamp(18px, 3vw, 34px);
    border-radius: clamp(16px, 2vw, 26px);
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:var(--shadow);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter: blur(16px);
    margin:auto;
  }

  .logoOrb{
    width: clamp(84px, 18vw, 130px);
    height: clamp(84px, 18vw, 130px);
    margin:0 auto clamp(10px, 2vw, 16px);
    border-radius:50%;
    background:linear-gradient(135deg,var(--logoBlue),var(--logoBlue2));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 25px 90px rgba(0,0,0,.55);
    border: clamp(4px, 1vw, 8px) solid #fff;
    overflow:hidden;
  }

  .logoOrb img{
    width: clamp(52px, 11vw, 82px);
    height: clamp(52px, 11vw, 82px);
    object-fit:contain;
    filter: drop-shadow(0 16px 26px rgba(0,0,0,.55));
  }

  .name{
    font-size: clamp(22px, 5vw, 30px);
    font-weight:900;
    letter-spacing: clamp(.06em, .25vw, .12em);
    margin:0 0 10px;
    line-height:1.1;
    word-break: break-word;
  }

  .tagTitle{
    font-size: clamp(10px, 2.4vw, 12px);
    letter-spacing: clamp(.08em, .5vw, .18em);
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 6px;
    line-height:1.3;
  }

  .offers{
    /* ✅ responsive: autorise le retour à la ligne */
    white-space:normal;
    overflow-wrap:anywhere;
    font-size: clamp(11px, 2.6vw, 13.5px);
    line-height:1.45;
    color:var(--muted);
    margin:0 0 clamp(14px, 2.5vw, 22px);
    max-width: 100%;
  }

  .count{
    display:grid;
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap: clamp(6px, 1.5vw, 10px);
  }

  .unit{
    padding: clamp(10px, 2vw, 14px) clamp(6px, 1.5vw, 10px);
    border-radius: clamp(10px, 2vw, 14px);
    background:rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.14);
    min-width:0; /* ✅ évite débordement */
  }

  .num{
    font-size: clamp(20px, 5.4vw, 34px);
    font-weight:900;
    font-variant-numeric: tabular-nums;
    line-height:1.05;
  }

  .lab{
    font-size: clamp(9px, 2.1vw, 11px);
    letter-spacing: clamp(.06em, .4vw, .14em);
    color:var(--muted);
    text-transform:uppercase;
    line-height:1.2;
    margin-top:2px;
  }

  /* ✅ Tablette compacte */
  @media (max-width: 820px){
    .card{
      width:min(700px, 100%);
    }
  }

  /* ✅ Mobile : compteur en 2 colonnes */
  @media (max-width: 560px){
    .count{
      grid-template-columns: repeat(2, minmax(0,1fr));
    }

    .offers{
      font-size: 12px;
    }
  }

  /* ✅ Très petit écran */
  @media (max-width: 360px){
    .count{
      grid-template-columns: 1fr;
    }
    .name{
      letter-spacing:.05em;
    }
  }

  /* ✅ Accessibilité / perf */
  @media (prefers-reduced-motion: reduce){
    #fx{ opacity:.35; }
  }
</style>
</head>

<body>
<canvas id="fx"></canvas>

<div class="card">
  <div class="logoOrb">
    <!-- ✅ Recolle ici ton src base64 complet actuel -->
    <img src="cyneris.jpg" alt="Cyneris">
  </div>

  <h1 class="name">CYNERIS</h1>

  <div class="tagTitle">BUILDING A SECURE PLATFORM</div>
  <div class="offers">Integrated SW · Cloud (IaaS/PaaS/SaaS) · Cybersecurity · Technical Debt · Data Science</div>

  <div class="count" aria-label="Countdown">
    <div class="unit"><div id="d" class="num">10</div><div class="lab">jours</div></div>
    <div class="unit"><div id="h" class="num">00</div><div class="lab">heures</div></div>
    <div class="unit"><div id="m" class="num">00</div><div class="lab">minutes</div></div>
    <div class="unit"><div id="s" class="num">00</div><div class="lab">secondes</div></div>
  </div>
</div>

<script>
  // =====================
  // Countdown (works + stable across reloads)
  // =====================
  const REVEAL_DAYS = 10;
  const KEY = "cyneris_reveal_target_ms_final_v1";

  const now = Date.now();
  let target = Number(localStorage.getItem(KEY));

  if (!target || target < now) {
    target = now + REVEAL_DAYS * 24 * 60 * 60 * 1000;
    localStorage.setItem(KEY, String(target));
  }

  const elD = document.getElementById("d");
  const elH = document.getElementById("h");
  const elM = document.getElementById("m");
  const elS = document.getElementById("s");
  const pad2 = (n) => String(n).padStart(2, "0");

  function tick() {
    const t = target - Date.now();
    if (t <= 0) {
      elD.textContent = "0";
      elH.textContent = "00";
      elM.textContent = "00";
      elS.textContent = "00";
      return;
    }
    const total = Math.floor(t / 1000);
    const days = Math.floor(total / (24 * 3600));
    const hours = Math.floor((total % (24 * 3600)) / 3600);
    const mins = Math.floor((total % 3600) / 60);
    const secs = total % 60;

    elD.textContent = String(days);
    elH.textContent = pad2(hours);
    elM.textContent = pad2(mins);
    elS.textContent = pad2(secs);
  }

  tick();
  setInterval(tick, 1000);

  // =====================
  // Animated background (responsive + perf-aware)
  // =====================
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");

  let W = 0, H = 0, DPR = 1;
  let NODE_COUNT = 120;
  let LINK_DIST = 170;
  let DOT_R = 2.2;
  let SPEED = 0.35;
  let nodes = [];
  let rafId = null;

  const rand = (a,b) => a + Math.random() * (b-a);

  function computeFXConfig() {
    const vw = window.innerWidth;
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (reducedMotion) {
      NODE_COUNT = 35;
      SPEED = 0.10;
    } else if (vw <= 480) {
      NODE_COUNT = 45;
      SPEED = 0.22;
    } else if (vw <= 768) {
      NODE_COUNT = 70;
      SPEED = 0.28;
    } else {
      NODE_COUNT = 120;
      SPEED = 0.35;
    }

    LINK_DIST = (vw <= 480 ? 110 : vw <= 768 ? 135 : 170) * DPR;
    DOT_R = (vw <= 480 ? 1.7 : 2.2) * DPR;
  }

  function resize() {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth * DPR);
    H = Math.floor(window.innerHeight * DPR);
    canvas.width = W;
    canvas.height = H;

    computeFXConfig();

    nodes = Array.from({length: NODE_COUNT}, () => ({
      x: rand(0, W),
      y: rand(0, H),
      vx: rand(-SPEED, SPEED) * DPR,
      vy: rand(-SPEED, SPEED) * DPR
    }));
  }

  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 120); // ✅ debounce resize
  });

  resize();

  function step() {
    ctx.clearRect(0, 0, W, H);

    // dots
    for (const n of nodes) {
      n.x += n.vx;
      n.y += n.vy;

      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;

      ctx.fillStyle = "rgba(20,184,214,0.95)";
      ctx.beginPath();
      ctx.arc(n.x, n.y, DOT_R, 0, Math.PI * 2);
      ctx.fill();
    }

    // links
    ctx.lineWidth = 1.1 * DPR;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d = Math.hypot(dx, dy);

        if (d < LINK_DIST) {
          const a = (1 - d / LINK_DIST) * 0.75;
          ctx.strokeStyle = `rgba(20,184,214,${a})`;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }

    rafId = requestAnimationFrame(step);
  }

  // ✅ pause / reprise quand onglet caché (perf)
  function startFX() {
    if (!rafId) rafId = requestAnimationFrame(step);
  }
  function stopFX() {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
  }

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopFX();
    else startFX();
  });

  startFX();
</script>
</body>
</html>
